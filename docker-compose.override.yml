# Development environment override
services:
  php:
    build:
      target: frankenphp_dev
    environment:
      APP_ENV: ${APP_ENV:-dev}
      APP_DEBUG: ${APP_DEBUG:-1}
      FRANKENPHP_ENABLE_WATCH: ${FRANKENPHP_ENABLE_WATCH:-1}
      FRANKENPHP_SITE_CONFIG: ${FRANKENPHP_SITE_CONFIG-hot_reload}
      FRANKENPHP_WORKER_CONFIG: ${FRANKENPHP_WORKER_CONFIG-watch}
      XDEBUG_MODE: '${XDEBUG_MODE:-off}'
      SERVER_NAME: ${SERVER_NAME:-localhost}, php:80
    volumes:
      - ./:/srv/app
      - ./frankenphp/Caddyfile:/etc/frankenphp/Caddyfile:ro
      - ./frankenphp/conf.d/20-app.dev.ini:/usr/local/etc/php/app.conf.d/20-app.dev.ini:ro
    extra_hosts:
      - host.docker.internal:host-gateway
    tty: true

  structurizr:
    image: structurizr/lite:2024.07.02
    ports:
      - '${STRUCTURIZR_PORT}:8080'
    volumes:
      - ./:/usr/local/structurizr

  aws-emulator:
    image: floci/floci:1.5.13-compat
    ports:
      - '${AWS_EMULATOR_PORT}:4566'
    healthcheck:
      test: ['CMD-SHELL', 'aws --endpoint-url=http://localhost:4566 sqs list-queues >/dev/null']
      interval: 5s
      timeout: 5s
      retries: 30
    environment:
      - FLOCI_DEFAULT_REGION=${AWS_SQS_REGION:-us-east-1}
      - FLOCI_HOSTNAME=aws-emulator
      - FLOCI_BASE_URL=http://aws-emulator:4566
      - FLOCI_STORAGE_MODE=hybrid
      - QUARKUS_LOG_LEVEL=DEBUG
      - AWS_ACCESS_KEY_ID=${AWS_SQS_KEY:-fake}
      - AWS_SECRET_ACCESS_KEY=${AWS_SQS_SECRET:-fake}
      - AWS_DEFAULT_REGION=${AWS_SQS_REGION:-us-east-1}
    volumes:
      - aws_emulator_data:/app/data

volumes:
  aws_emulator_data:
