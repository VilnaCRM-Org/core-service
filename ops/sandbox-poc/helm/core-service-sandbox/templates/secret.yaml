apiVersion: v1
kind: Secret
metadata:
  name: {{ include "core-service-sandbox.envSecretName" . }}
  labels:
    {{- include "core-service-sandbox.labels" . | nindent 4 }}
type: Opaque
stringData:
  APP_ENV: {{ .Values.app.env.appEnv | quote }}
  APP_DEBUG: {{ .Values.app.env.appDebug | quote }}
  APP_SECRET: {{ .Values.app.env.appSecret | quote }}
  DB_USER: {{ .Values.app.env.dbUser | quote }}
  DB_PASSWORD: {{ .Values.app.env.dbPassword | quote }}
  DB_HOST: {{ include "core-service-sandbox.mongodbServiceName" . | quote }}
  DB_PORT: {{ printf "%v" .Values.app.env.dbPort | quote }}
  DB_NAME: {{ .Values.app.env.dbName | quote }}
  DB_AUTH_DATABASE: {{ .Values.app.env.dbAuthDatabase | quote }}
  DB_URL: {{ printf "mongodb://%s:%s@%s:%v" .Values.app.env.dbUser .Values.app.env.dbPassword (include "core-service-sandbox.mongodbServiceName" .) .Values.mongodb.service.port | quote }}
  REDIS_HOST: {{ include "core-service-sandbox.redisServiceName" . | quote }}
  REDIS_PORT: {{ printf "%v" .Values.redis.service.port | quote }}
  REDIS_URL: {{ printf "redis://%s:%v/%v" (include "core-service-sandbox.redisServiceName" .) .Values.redis.service.port .Values.app.env.redisDatabase | quote }}
  AWS_SQS_VERSION: {{ .Values.app.env.awsSqsVersion | quote }}
  AWS_SQS_REGION: {{ .Values.app.env.awsSqsRegion | quote }}
  AWS_SQS_ENDPOINT_BASE: {{ printf "http://%s" (include "core-service-sandbox.localstackServiceName" .) | quote }}
  AWS_SQS_KEY: {{ .Values.app.env.awsSqsKey | quote }}
  AWS_SQS_SECRET: {{ .Values.app.env.awsSqsSecret | quote }}
  LOCALSTACK_HOST: {{ include "core-service-sandbox.localstackServiceName" . | quote }}
  LOCALSTACK_PORT: {{ printf "%v" .Values.app.env.localstackPort | quote }}
  DOMAIN_EVENTS_QUEUE_NAME: {{ .Values.app.env.domainEventsQueueName | quote }}
  FAILED_DOMAIN_EVENTS_QUEUE_NAME: {{ .Values.app.env.failedDomainEventsQueueName | quote }}
  DOMAIN_EVENTS_TRANSPORT_DSN: {{ printf "sqs://%s:%v/000000000000/%s?sslmode=disable" (include "core-service-sandbox.localstackServiceName" .) .Values.app.env.localstackPort .Values.app.env.domainEventsQueueName | quote }}
  FAILED_DOMAIN_EVENTS_TRANSPORT_DSN: {{ printf "sqs://%s:%v/000000000000/%s?sslmode=disable" (include "core-service-sandbox.localstackServiceName" .) .Values.app.env.localstackPort .Values.app.env.failedDomainEventsQueueName | quote }}
  SERVER_NAME: {{ .Values.app.env.serverName | quote }}
  CADDY_MERCURE_JWT_SECRET: {{ .Values.app.env.caddyMercureJwtSecret | quote }}
  MERCURE_URL: {{ printf "http://%s/.well-known/mercure" (include "core-service-sandbox.httpServiceName" .) | quote }}
  MERCURE_PUBLIC_URL: {{ printf "http://%s/.well-known/mercure" (include "core-service-sandbox.httpServiceName" .) | quote }}
  MERCURE_JWT_SECRET: {{ .Values.app.env.caddyMercureJwtSecret | quote }}
  MERCURE_PUBLISHER_JWT_KEY: {{ .Values.app.env.caddyMercureJwtSecret | quote }}
  MERCURE_SUBSCRIBER_JWT_KEY: {{ .Values.app.env.caddyMercureJwtSecret | quote }}
  AWS_EMF_NAMESPACE: {{ .Values.app.env.awsEmfNamespace | quote }}
  GIT_AUTHOR_NAME: {{ .Values.app.workspace.gitAuthorName | quote }}
  GIT_AUTHOR_EMAIL: {{ .Values.app.workspace.gitAuthorEmail | quote }}
  GIT_COMMITTER_NAME: {{ .Values.app.workspace.gitAuthorName | quote }}
  GIT_COMMITTER_EMAIL: {{ .Values.app.workspace.gitAuthorEmail | quote }}
  SANDBOX_WORKSPACE_ROOT: {{ .Values.app.workspace.repoDir | quote }}
  SANDBOX_WORKSPACE_SUBPATH: {{ .Values.app.workspace.repoSubPath | quote }}
{{- range $key, $value := .Values.app.env.extra }}
  {{ $key }}: {{ $value | quote }}
{{- end }}
