apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "core-service-sandbox.redisServiceName" . }}
  labels:
    {{- include "core-service-sandbox.componentLabels" (dict "root" . "component" "redis") | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "core-service-sandbox.componentSelectorLabels" (dict "root" . "component" "redis") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "core-service-sandbox.componentLabels" (dict "root" . "component" "redis") | nindent 8 }}
    spec:
      containers:
        - name: redis
          image: {{ printf "%s:%s" .Values.images.redis.repository .Values.images.redis.tag | quote }}
          imagePullPolicy: {{ .Values.images.redis.pullPolicy }}
          command:
            - redis-server
            - --save
            - ""
            - --appendonly
            - "no"
          ports:
            - name: redis
              containerPort: {{ .Values.redis.service.port }}
          readinessProbe:
            exec:
              command:
                - /bin/sh
                - -lc
                - test "$(redis-cli ping)" = "PONG"
            initialDelaySeconds: {{ .Values.probes.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.periodSeconds }}
            timeoutSeconds: {{ .Values.probes.timeoutSeconds }}
            failureThreshold: {{ .Values.probes.failureThreshold }}
          livenessProbe:
            exec:
              command:
                - /bin/sh
                - -lc
                - test "$(redis-cli ping)" = "PONG"
            initialDelaySeconds: {{ add .Values.probes.initialDelaySeconds 15 }}
            periodSeconds: {{ .Values.probes.periodSeconds }}
            timeoutSeconds: {{ .Values.probes.timeoutSeconds }}
            failureThreshold: {{ .Values.probes.failureThreshold }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "core-service-sandbox.redisServiceName" . }}
  labels:
    {{- include "core-service-sandbox.componentLabels" (dict "root" . "component" "redis") | nindent 4 }}
spec:
  selector:
    {{- include "core-service-sandbox.componentSelectorLabels" (dict "root" . "component" "redis") | nindent 4 }}
  ports:
    - name: redis
      port: {{ .Values.redis.service.port }}
      targetPort: redis
