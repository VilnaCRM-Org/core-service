name: GraphQL spec backward comparability

on:
  pull_request:

permissions:
  contents: write
  pull-requests: write
  checks: write
  statuses: write

jobs:
  graphql-diff:
    name: Openapi-diff
    runs-on: ubuntu-latest

    steps:
      - name: Generate token with necessary permissions
        id: generate_token
        uses: tibdex/github-app-token@v2
        with:
          app_id: ${{ secrets.VILNACRM_APP_ID }}
          private_key: ${{ secrets.VILNACRM_APP_PRIVATE_KEY }}

      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ vars.PHP_VERSION }}

      - name: Checkout Repository
        uses: actions/checkout@v4.2.1
        with:
          token: ${{ steps.generate_token.outputs.token }}
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Install Dependencies
        run: composer install -q --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist

      - name: Start application
        run: make start

      - name: Generate GraphQL spec
        run: make generate-graphql-spec

      - name: Copy openapi spec to host
        run: docker cp core-service-php-1:/srv/app/.github/graphql-spec/spec .github/graphql-spec/spec

      - name: Commit changes
        uses: EndBug/add-and-commit@v9
        with:
          add: '.github/graphql-spec/spec'
          message: 'feat(#${{ github.event.number }}): generate graphql spec'

      # GraphQL Inspector step disabled - the action has bugs with local file paths
      # The schema is still being generated and committed successfully
      - name: Verify GraphQL schema compatibility (temporary fallback)
        run: |
          git fetch origin "${{ github.base_ref }}" --depth=1
          if git cat-file -e "origin/${{ github.base_ref }}:.github/graphql-spec/spec" 2>/dev/null; then
            git show "origin/${{ github.base_ref }}:.github/graphql-spec/spec" > /tmp/base.graphql
            cp .github/graphql-spec/spec /tmp/head.graphql
            npx -y @graphql-inspector/cli@4.0.0 diff /tmp/base.graphql /tmp/head.graphql --fail-on-breaking
          else
            echo "Base schema not found on ${GITHUB_BASE_REF}; skipping compatibility check."
          fi
