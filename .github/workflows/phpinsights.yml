name: code quality

on:
  pull_request:

jobs:
  phpinsights:
    runs-on: ubuntu-latest
    name: PHP Insights checks
    steps:
      - uses: actions/checkout@v4
      - name: Start application services
        run: make start
      - name: Run PHP Insights checks
        run: make phpinsights
      - name: Stop application services
        if: always()
        run: make down
