name: Memory safety testing

on:
  pull_request:
    branches: ['main']

permissions:
  contents: read

jobs:
  memory-tests:
    name: Memory leak tests
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      COMPOSE_FILE: docker-compose.yml:docker-compose.override.yml:docker-compose.load_test.override.yml:docker-compose.frankenphp.worker.override.yml
      FRANKENPHP_LOOP_MAX: 500
      SOAK_ITERATIONS: 5
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Start worker-mode stack
        timeout-minutes: 15
        run: make start

      - name: Execute worker-mode verification
        timeout-minutes: 35
        run: make worker-mode-verification

      - name: Copy memory coverage report to host
        if: always()
        timeout-minutes: 5
        run: make export-memory-coverage

      - name: Upload memory coverage to Codecov
        if: ${{ always() && github.repository == github.event.pull_request.head.repo.full_name }}
        timeout-minutes: 10
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: /tmp/memory-coverage.xml
          flags: memory-tests
          name: codecov-memory
          fail_ci_if_error: true
          verbose: true

      - name: Stop worker-mode stack
        if: always()
        timeout-minutes: 10
        run: make down
