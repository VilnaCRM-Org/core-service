name: E2E testing

on:
  pull_request:

jobs:
  behat:
    name: Behat
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Start Application
        run: make start

      - name: Run Behat Tests
        run: make behat

      - name: Stop Application
        if: always()
        run: make down
