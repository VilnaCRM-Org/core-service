name: openapi-diff

on:
  pull_request:

jobs:
  openapi-diff:
    runs-on: ubuntu-latest
    steps:
      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ vars.PHP_VERSION }}
      - uses: actions/checkout@v3
        with:
          ref: ${{ github.event.pull_request.head.ref }}
      - name: Copy .env.test.local
        run: php -r "file_exists('.env.test.local') || copy('.env.test', '.env.test.local');"
      - name: Cache Composer packages
        id: composer-cache
        uses: actions/cache@v3
        with:
          path: vendor
          key: ${{ runner.os }}-php-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-php-
      - name: Install Dependencies
        run: composer install -q --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist
      - name: Generate openapi spec
        run: |
          php bin/console --env=test api:openapi:export --yaml --output=.github/openapi-spec/spec.yaml
          php scripts/fix-openapi-spec.php
      - name: Commit changes
        uses: EndBug/add-and-commit@v9
        with:
          add: '.github/openapi-spec/spec.yaml'
          message: 'feat(#${{ toJSON(github.event.number) }}): generate openapi spec'
      - name: Check out head branch
        uses: actions/checkout@v2
        with:
          path: head
      - name: Check out master branch
        uses: actions/checkout@v2
        with:
          ref: main
          path: base
      - name: Generate openapi spec for base
        run: |
          # Install base dependencies from base's own composer.lock
          if [ -f composer.lock ]; then
            composer install -q --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist
          fi
          if [ ! -f .env.test.local ] && [ -f .env.test ]; then
            cp .env.test .env.test.local
          fi
          # Generate spec for base; fail fast if checkout is incomplete
          if [ ! -f bin/console ]; then
            echo "Error: base/bin/console not found; cannot generate OpenAPI spec" >&2
            exit 1
          fi
          php bin/console --env=test api:openapi:export --yaml --output=.github/openapi-spec/spec.yaml
          php ../scripts/fix-openapi-spec.php .github/openapi-spec/spec.yaml
        working-directory: base
      - name: Run OpenAPI Diff (from HEAD revision)
        run: |
          mkdir -p ./output
          docker run --rm -v ${{ github.workspace }}:/github/workspace openapitools/openapi-diff:2.1.7 --markdown /github/workspace/output/diff.md /github/workspace/base/.github/openapi-spec/spec.yaml /github/workspace/.github/openapi-spec/spec.yaml
      - uses: actions/upload-artifact@v4
        with:
          name: diff-reports
          path: ./output
