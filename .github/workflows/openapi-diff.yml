name: openapi-diff

on:
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  openapi-diff:
    runs-on: ubuntu-latest
    steps:
      - name: Dependabot skip
        if: startsWith(github.actor, 'dependabot')
        run: echo "Skipping OpenAPI diff for Dependabot PR"

      - uses: shivammathur/setup-php@7c071dfe9dc99bdf297fa79cb49ea005b9fcadbc
        if: ${{ !startsWith(github.actor, 'dependabot') }}
        with:
          php-version: ${{ vars.PHP_VERSION }}

      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        if: ${{ !startsWith(github.actor, 'dependabot') }}
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          persist-credentials: true

      - name: Copy .env.test.local
        if: ${{ !startsWith(github.actor, 'dependabot') }}
        run: php -r "file_exists('.env.test.local') || copy('.env.test', '.env.test.local');"

      - name: Cache Composer packages
        if: ${{ !startsWith(github.actor, 'dependabot') }}
        id: composer-cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830
        with:
          path: vendor
          key: ${{ runner.os }}-php-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-php-

      - name: Install Dependencies
        if: ${{ !startsWith(github.actor, 'dependabot') }}
        run: composer install -q --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist

      - name: Generate openapi spec
        if: ${{ !startsWith(github.actor, 'dependabot') }}
        run: |
          php bin/console --env=test api:openapi:export --yaml --output=.github/openapi-spec/spec.yaml

      - name: Commit changes
        if: ${{ !startsWith(github.actor, 'dependabot') }}
        uses: EndBug/add-and-commit@a94899bca583c204427a224a7af87c02f9b325d5
        with:
          add: '.github/openapi-spec/spec.yaml'
          message: 'feat(#${{ toJSON(github.event.number) }}): generate openapi spec'

      - name: Check out head branch
        if: ${{ !startsWith(github.actor, 'dependabot') }}
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          path: head
          persist-credentials: false

      - name: Check out master branch
        if: ${{ !startsWith(github.actor, 'dependabot') }}
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ github.event.pull_request.base.ref }}
          path: base
          persist-credentials: false

      - name: Run OpenAPI Diff (from HEAD revision)
        if: ${{ !startsWith(github.actor, 'dependabot') }}
        env:
          OPENAPI_DIFF_IMAGE: openapitools/openapi-diff@sha256:82291446e5554742d9c0725d7b315d18e93958c5526f9a663e8885227bdd6cb6
        run: |
          for attempt in 1 2 3 4 5; do
            if docker pull "$OPENAPI_DIFF_IMAGE"; then
              break
            fi

            if [ "$attempt" -eq 5 ]; then
              exit 1
            fi

            sleep $((attempt * 15))
          done

          docker run --rm \
            -v "$GITHUB_WORKSPACE:/github/workspace" \
            -w /github/workspace \
            "$OPENAPI_DIFF_IMAGE" \
            /github/workspace/head/.github/openapi-spec/spec.yaml \
            /github/workspace/base/.github/openapi-spec/spec.yaml

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        if: ${{ !startsWith(github.actor, 'dependabot') }}
        with:
          name: diff-reports
          path: ./output
