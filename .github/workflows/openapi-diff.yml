name: openapi-diff

on:
  pull_request:

jobs:
  openapi-diff:
    runs-on: ubuntu-latest
    steps:
      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ vars.PHP_VERSION }}
      - uses: actions/checkout@v3
        with:
          ref: ${{ github.event.pull_request.head.ref }}
      - name: Copy .env.test.local
        run: php -r "file_exists('.env.test.local') || copy('.env.test', '.env.test.local');"
      - name: Cache Composer packages
        id: composer-cache
        uses: actions/cache@v3
        with:
          path: vendor
          key: ${{ runner.os }}-php-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-php-
      - name: Install Dependencies
        run: composer install -q --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist
      - name: Generate openapi spec
        run: |
          php bin/console --env=test api:openapi:export --yaml --output=.github/openapi-spec/spec.yaml
          php scripts/fix-openapi-spec.php
      - name: Commit changes
        uses: EndBug/add-and-commit@v9
        with:
          add: '.github/openapi-spec/spec.yaml'
          message: 'feat(#${{ toJSON(github.event.number) }}): generate openapi spec'
      - name: Check out head branch
        uses: actions/checkout@v2
        with:
          path: head
      - name: Check out master branch
        uses: actions/checkout@v2
        with:
          ref: main
          path: base
      - name: Generate and fix openapi spec for base
        run: |
          # Copy vendor, env and fix script from HEAD to base
          cp -r ../vendor vendor
          cp ../.env.test.local .env.test.local 2>/dev/null || true
          if [ -f ../scripts/fix-openapi-spec.php ]; then
            cp ../scripts/fix-openapi-spec.php scripts/
          fi
          # Generate spec for base (only if bin/console exists)
          if [ -f bin/console ]; then
            php bin/console --env=test api:openapi:export --yaml --output=.github/openapi-spec/spec.yaml
          fi
          # Apply fixes if script exists
          if [ -f scripts/fix-openapi-spec.php ]; then
            php scripts/fix-openapi-spec.php
          fi
        working-directory: base
      - name: Run OpenAPI Diff (from HEAD revision)
        uses: docker://openapitools/openapi-diff:latest
        with:
          args: '/github/workspace/head/.github/openapi-spec/spec.yaml /github/workspace/base/.github/openapi-spec/spec.yaml'
      - uses: actions/upload-artifact@v4
        with:
          name: diff-reports
          path: ./output
