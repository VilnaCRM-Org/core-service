name: Generate Changelog and Create Release

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Generate token
        id: generate_token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1
        with:
          app-id: ${{ secrets.VILNACRM_APP_ID }}
          private-key: ${{ secrets.VILNACRM_APP_PRIVATE_KEY }}
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          token: ${{ steps.generate_token.outputs.token }}
          fetch-depth: 0
          persist-credentials: false

      - name: Sync version file with latest tag
        run: |
          latest_tag="$(git tag --list 'v[0-9]*' --sort=-v:refname | head -n 1)"
          if [ -z "$latest_tag" ]; then
            exit 0
          fi

          latest_version="${latest_tag#v}"
          current_version="$(jq -r '.version // "0.0.0"' composer.json)"
          highest_version="$(printf '%s\n%s\n' "$current_version" "$latest_version" | sort -V | tail -n 1)"

          if [ "$highest_version" = "$latest_version" ] && [ "$current_version" != "$latest_version" ]; then
            tmp_file="$(mktemp)"
            jq --arg version "$latest_version" '.version = $version' composer.json > "$tmp_file"
            mv "$tmp_file" composer.json
          fi

      - name: Conventional Changelog Action
        id: changelog
        uses: TriPSs/conventional-changelog-action@952b14bbc4be87e8458a6ac5926fc655608b1b19
        with:
          github-token: ${{ steps.generate_token.outputs.token }}
          output-file: 'CHANGELOG.md'
          version-file: 'composer.json'
      - name: Create Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda
        if: ${{ steps.changelog.outputs.skipped == 'false' }}
        with:
          tag_name: ${{ steps.changelog.outputs.tag }}
          name: ${{ steps.changelog.outputs.tag }}
          body: ${{ steps.changelog.outputs.clean_changelog }}
          token: ${{ steps.generate_token.outputs.token }}
