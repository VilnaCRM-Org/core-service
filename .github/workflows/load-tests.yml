name: Load testing

on:
  pull_request:
    branches: ['main']

permissions:
  contents: read

jobs:
  load-tests-sharded:
    name: Run K6 Smoke Shard (${{ matrix.shard }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 4
      matrix:
        shard: [0, 1, 2, 3]
    timeout-minutes: 25
    env:
      COMPOSE_FILE: docker-compose.yml:docker-compose.override.yml:docker-compose.load_test.override.yml

    steps:
      - name: Dependabot skip
        if: startsWith(github.actor, 'dependabot')
        run: echo "Skipping load tests for Dependabot PR"

      - name: Checkout Repository
        if: ${{ !startsWith(github.actor, 'dependabot') }}
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false

      - name: Start application
        if: ${{ !startsWith(github.actor, 'dependabot') }}
        run: make start

      - name: Run sharded smoke load tests
        if: ${{ !startsWith(github.actor, 'dependabot') }}
        run: make smoke-load-tests SHARD_INDEX=${{ matrix.shard }} SHARD_TOTAL=4 K6_SMOKE_RETRIES=2 K6_SMOKE_RETRY_DELAY_SECONDS=1

      - name: Stop application
        if: ${{ !startsWith(github.actor, 'dependabot') && always() }}
        run: make down

  load-tests:
    name: K6
    runs-on: ubuntu-latest
    needs:
      - load-tests-sharded
    if: ${{ always() }}
    steps:
      - name: Dependabot skip
        if: startsWith(github.actor, 'dependabot')
        run: echo "Skipping load test summary for Dependabot PR"

      - name: Validate all K6 shards succeeded
        if: ${{ !startsWith(github.actor, 'dependabot') }}
        run: |
          if [ "${{ needs.load-tests-sharded.result }}" != "success" ]; then
            echo "At least one K6 shard failed."
            exit 1
          fi
          echo "All K6 shards passed."
