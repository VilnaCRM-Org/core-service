name: Static analysis and fixers

on:
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Dependabot skip
        if: startsWith(github.actor, 'dependabot')
        run: echo "Skipping lint checks for Dependabot PR"

      - name: Generate token with necessary permissions
        if: ${{ !startsWith(github.actor, 'dependabot') }}
        id: generate_token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1
        with:
          app-id: ${{ secrets.VILNACRM_APP_ID }}
          private-key: ${{ secrets.VILNACRM_APP_PRIVATE_KEY }}

      - name: Checkout code
        if: ${{ !startsWith(github.actor, 'dependabot') }}
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          token: ${{ !startsWith(github.actor, 'dependabot') && steps.generate_token.outputs.token || github.token }}
          fetch-depth: 0
          persist-credentials: true

      - name: Import GPG key
        if: ${{ !startsWith(github.actor, 'dependabot') }}
        id: import-gpg
        uses: crazy-max/ghaction-import-gpg@e89d40939c28e39f97cf32126055eeae86ba74ec
        with:
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.GPG_PASSPHRASE }}
          git_user_signingkey: true
          git_commit_gpgsign: true
          git_config_global: true
          git_tag_gpgsign: true

      - name: Configure GPG for automated signing
        if: ${{ !startsWith(github.actor, 'dependabot') }}
        run: |
          GPG_TTY="$(tty || true)"
          export GPG_TTY
          echo "GPG_TTY=$GPG_TTY" >> "$GITHUB_ENV"
          echo "GPG_PASSPHRASE=${{ secrets.GPG_PASSPHRASE }}" >> "$GITHUB_ENV"
          mkdir -p ~/.gnupg
          chmod 700 ~/.gnupg
          cat > ~/.gnupg/gpg.conf << EOF
          batch
          no-tty
          pinentry-mode loopback
          EOF
          cat > ~/.gnupg/gpg-agent.conf << EOF
          allow-loopback-pinentry
          pinentry-mode loopback
          max-cache-ttl 86400
          default-cache-ttl 86400
          EOF
          gpg-connect-agent reloadagent /bye || true
          cat > ~/.gnupg/gpg-wrapper.sh << 'EOF'
          #!/bin/bash
          GPG_TTY="$(tty || true)"
          export GPG_TTY
          case "$*" in
            *--detach-sign*|*--sign*)
              echo "$GPG_PASSPHRASE" | gpg --batch --yes --pinentry-mode loopback --passphrase-fd 0 "$@"
              ;;
            *)
              gpg "$@"
              ;;
          esac
          EOF
          chmod +x ~/.gnupg/gpg-wrapper.sh
          git config --global gpg.program ~/.gnupg/gpg-wrapper.sh

      - name: Test GPG signing
        if: ${{ !startsWith(github.actor, 'dependabot') }}
        run: |
          echo "Testing GPG signing..."
          echo "test message" | ~/.gnupg/gpg-wrapper.sh --armor --detach-sign > /dev/null 2>&1 && echo "✅ GPG signing works" || echo "❌ GPG signing failed"

      - name: Run Super-Linter
        if: ${{ !startsWith(github.actor, 'dependabot') }}
        continue-on-error: true
        uses: super-linter/super-linter@47984f49b4e87383eed97890fe2dca6063bbd9c3
        env:
          FILTER_REGEX_EXCLUDE: '^\\.github/openapi-spec/'
          VALIDATE_JAVASCRIPT_ES: true
          VALIDATE_MARKDOWN: true
          VALIDATE_MARKDOWN_PRETTIER: true
          FIX_MARKDOWN_PRETTIER: true
          VALIDATE_YAML: true
          FIX_YAML_PRETTIER: true
          VALIDATE_YAML_PRETTIER: true
          VALIDATE_ENV: true
          VALIDATE_JAVASCRIPT_PRETTIER: true
          FIX_JAVASCRIPT_PRETTIER: true
          VALIDATE_ALL_CODEBASE: true
          GITHUB_TOKEN: ${{ !startsWith(github.actor, 'dependabot') && steps.generate_token.outputs.token || github.token }}

      - name: Commit and push linting fixes
        if: >
          !startsWith(github.actor, 'dependabot') &&
          github.event_name == 'pull_request' && github.ref_name !=
          github.event.repository.default_branch
        env:
          GPG_TTY: ${{ env.GPG_TTY }}
          GPG_PASSPHRASE: ${{ env.GPG_PASSPHRASE }}
        uses: stefanzweifel/git-auto-commit-action@b863ae1933cb653a53c021fe36dbb774e1fb9403
        with:
          branch: ${{ github.event.pull_request.head.ref || github.head_ref || github.ref }}
          commit_message: 'chore(#${{ github.event.number }}): fix linting issues'
          commit_author: '${{ steps.import-gpg.outputs.name }} <${{ steps.import-gpg.outputs.email }}>'
          commit_user_name: ${{ steps.import-gpg.outputs.name }}
          commit_user_email: ${{ steps.import-gpg.outputs.email }}
          commit_options: '--signoff --gpg-sign'
