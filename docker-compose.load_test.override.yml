# Load tests environment override
services:
  php:
    depends_on:
      database:
        condition: service_healthy
      redis:
        condition: service_started
      aws-emulator:
        condition: service_healthy
    restart: unless-stopped
    environment:
      APP_DEBUG: ${APP_DEBUG:-0}
      FRANKENPHP_ENABLE_WATCH: ${FRANKENPHP_ENABLE_WATCH:-0}
      FRANKENPHP_SITE_CONFIG: '${FRANKENPHP_SITE_CONFIG-}'
      FRANKENPHP_WORKER_CONFIG: '${FRANKENPHP_WORKER_CONFIG-}'
      SERVER_NAME: ${SERVER_NAME:-localhost}, php:80
      MERCURE_URL: ${CADDY_MERCURE_URL:-http://localhost/.well-known/mercure}
      MERCURE_PUBLIC_URL: ${CADDY_MERCURE_PUBLIC_URL:-https://${SERVER_NAME:-localhost}:${HTTPS_PORT:-443}/.well-known/mercure}
      DB_URL: mongodb://${DB_USER}:${DB_PASSWORD}@database:27017
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      XDEBUG_MODE: ${XDEBUG_MODE:-off}
    extra_hosts:
      - host.docker.internal:host-gateway

  aws-emulator:
    image: floci/floci:latest-compat
    ports:
      - '${AWS_EMULATOR_PORT}:4566'
    healthcheck:
      test: ['CMD-SHELL', 'aws --endpoint-url=http://localhost:4566 sqs list-queues >/dev/null']
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 10s
    environment:
      - FLOCI_DEFAULT_REGION=${AWS_SQS_REGION:-us-east-1}
      - FLOCI_HOSTNAME=aws-emulator
      - FLOCI_BASE_URL=http://aws-emulator:4566
      - AWS_ACCESS_KEY_ID=${AWS_SQS_KEY:-fake}
      - AWS_SECRET_ACCESS_KEY=${AWS_SQS_SECRET:-fake}
      - AWS_DEFAULT_REGION=${AWS_SQS_REGION:-us-east-1}
    volumes:
      - aws_emulator_data:/app/data
      - /var/run/docker.sock:/var/run/docker.sock
    user: root

volumes:
  aws_emulator_data:
