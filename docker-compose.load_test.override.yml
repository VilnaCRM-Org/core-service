# Load tests environment override
services:
  php:
    build:
      context: .
      target: frankenphp_dev
      args:
        SYMFONY_VERSION: ${SYMFONY_VERSION:-}
        STABILITY: ${STABILITY:-stable}
    depends_on:
      database:
        condition: service_healthy
      redis:
        condition: service_started
      localstack:
        condition: service_healthy
    restart: unless-stopped
    environment:
      SERVER_NAME: ${SERVER_NAME:-localhost}, php:80
      MERCURE_URL: ${CADDY_MERCURE_URL:-http://localhost/.well-known/mercure}
      MERCURE_PUBLIC_URL: ${CADDY_MERCURE_PUBLIC_URL:-https://${SERVER_NAME:-localhost}:${HTTPS_PORT:-443}/.well-known/mercure}
      DB_URL: mongodb://${DB_USER}:${DB_PASSWORD}@database:27017
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      XDEBUG_MODE: ${XDEBUG_MODE:-off}
    volumes:
      - ./:/srv/app
      - ./frankenphp/Caddyfile:/etc/frankenphp/Caddyfile:ro
    extra_hosts:
      - host.docker.internal:host-gateway

  database:
    image: mongo:6.0
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${DB_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${DB_PASSWORD}
    ports:
      - '${DB_PORT}:27017'
    volumes:
      - db_data:/data/db
    healthcheck:
      test: ['CMD', 'mongosh', '--eval', 'db.runCommand({ ping: 1 }).ok']
      interval: 10s
      timeout: 5s
      retries: 5

  localstack:
    image: localstack/localstack:3.4.0
    ports:
      - '${LOCALSTACK_PORT}:4566'
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'curl -fsS http://localhost:4566/_localstack/health | grep -Eq "\"sqs\": \"(available|running)\""',
        ]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 10s
    environment:
      - SERVICES=sqs
      - DEBUG=0
    volumes:
      - localstack_data:/var/lib/localstack

  redis:
    image: redis:8.0.0-alpine
    ports:
      - '${REDIS_PORT:-6379}:6379'

volumes:
  db_data:
  localstack_data:
