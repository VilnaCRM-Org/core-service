# This file is the entry point to configure your own services.
# Files in the packages/ subdirectory configure your dependencies.

# Put parameters here that don't need to change on each machine where the app is deployed
# https://symfony.com/doc/current/best_practices.html#use-parameters-for-application-configuration
parameters:
  app.customer_cache.detail_ttl: '%env(int:CUSTOMER_CACHE_DETAIL_TTL)%'
  app.customer_cache.lookup_ttl: '%env(int:CUSTOMER_CACHE_LOOKUP_TTL)%'
  app.customer_cache.collection_ttl: '%env(int:CUSTOMER_CACHE_COLLECTION_TTL)%'
  app.customer_cache.reference_ttl: '%env(int:CUSTOMER_CACHE_REFERENCE_TTL)%'
  app.customer_cache.negative_lookup_ttl: '%env(int:CUSTOMER_CACHE_NEGATIVE_LOOKUP_TTL)%'

services:
  # default configuration for services in *this* file
  _defaults:
    autowire: true # Automatically injects dependencies in your services.
    autoconfigure: true # Automatically registers your services as commands, event subscribers, etc.

  app.customer.mongodb.order_filter:
    parent: 'api_platform.doctrine_mongodb.odm.order_filter'
    arguments:
      [
        {
          'ulid': 'desc',
          'createdAt': 'desc',
          'updatedAt': 'desc',
          'email': 'asc',
          'initials': 'asc',
          'phone': 'asc',
          'leadSource': 'asc',
          'type.value': 'asc',
          'status.value': 'asc',
        },
      ]
    tags:
      - { name: 'api_platform.filter', id: 'customer.mongodb.order' }

  app.customer.mongodb.range_filter:
    parent: 'api_platform.doctrine_mongodb.odm.range_filter'
    class: App\Shared\Infrastructure\Filter\UlidRangeFilter
    arguments: [{ 'ulid': ~ }]
    tags:
      - { name: 'api_platform.filter', id: 'mongodb.range' }

  app.customer.mongodb.date_filter:
    parent: 'api_platform.doctrine_mongodb.odm.date_filter'
    arguments: [{ 'createdAt': ~, 'updatedAt': ~ }]
    tags:
      - { name: 'api_platform.filter', id: 'customer.mongodb.date' }

  app.customer.mongodb.boolean_filter:
    parent: 'api_platform.doctrine_mongodb.odm.boolean_filter'
    arguments: [{ 'confirmed': ~ }]
    tags:
      - { name: 'api_platform.filter', id: 'customer.mongodb.boolean' }

  app.customer.mongodb.search_filter:
    parent: 'api_platform.doctrine_mongodb.odm.search_filter'
    arguments:
      [
        {
          initials: 'exact',
          email: 'exact',
          phone: 'exact',
          leadSource: 'exact',
          'type.value': 'exact',
          'status.value': 'exact',
        },
      ]
    tags:
      - { name: 'api_platform.filter', id: 'customer.mongodb.search' }

  app.customer_type.order_filter:
    parent: 'api_platform.doctrine_mongodb.odm.order_filter'
    arguments: [{ 'ulid': 'desc', 'value': 'asc' }]
    tags:
      - { name: 'api_platform.filter', id: 'customer.mongodb.type.order' }

  app.customer_type.partial_search_filter:
    parent: 'api_platform.doctrine_mongodb.odm.search_filter'
    arguments: [{ 'value': 'partial' }]
    tags:
      - { name: 'api_platform.filter', id: 'customer.mongodb.type.partial_search' }

  app.customer_status.order_filter:
    parent: 'api_platform.doctrine_mongodb.odm.order_filter'
    arguments: [{ 'ulid': 'desc', 'value': 'asc' }]
    tags:
      - { name: 'api_platform.filter', id: 'customer.mongodb.status.order' }

  app.customer_status.partial_search_filter:
    parent: 'api_platform.doctrine_mongodb.odm.search_filter'
    arguments: [{ 'value': 'partial' }]
    tags:
      - { name: 'api_platform.filter', id: 'customer.mongodb.status.partial_search' }

  # makes classes in src/ available to be used as services
  # this creates a service per class whose id is the fully-qualified class name
  App\:
    resource: '../src/'
    exclude:
      - '../src/Shared/Kernel.php'
      - '../src/Shared/Application/Validator/LoggingMutationInputValidator.php'

  App\Shared\Infrastructure\Observability\Factory\EmfAwsMetadataFactory:
    arguments:
      $namespace: '%env(AWS_EMF_NAMESPACE)%'

  App\Shared\Infrastructure\RetryStrategy\InfiniteRetryStrategy:
    arguments:
      $delayMs: '%env(int:MESSENGER_RETRY_DELAY_MS)%'

  App\Shared\Infrastructure\EventListener\ApiNotFoundProblemListener:
    tags:
      - {
          name: 'kernel.event_listener',
          event: 'kernel.exception',
          method: 'onKernelException',
          priority: 255,
        }

  App\Shared\Infrastructure\EventListener\ApiQueryParametersListener:
    tags:
      - {
          name: 'kernel.event_listener',
          event: 'kernel.request',
          method: '__invoke',
          priority: 512,
        }

  App\Core\Customer\Infrastructure\Collection\CustomerCachePolicyCollection:
    arguments:
      $detailTtl: '%app.customer_cache.detail_ttl%'
      $lookupTtl: '%app.customer_cache.lookup_ttl%'
      $collectionTtl: '%app.customer_cache.collection_ttl%'
      $referenceTtl: '%app.customer_cache.reference_ttl%'
      $negativeLookupTtl: '%app.customer_cache.negative_lookup_ttl%'

  App\Shared\Infrastructure\Resolver\CachePoolResolver:
    arguments:
      $cachePools: !service_locator
        customer: '@cache.customer'

  App\Shared\Application\Resolver\CachePoolResolverInterface:
    alias: App\Shared\Infrastructure\Resolver\CachePoolResolver

  App\Shared\Application\Validator\MutationInputValidatorInterface:
    alias: App\Shared\Application\Validator\MutationInputValidator

  App\Core\Customer\Application\Resolver\CustomerReferenceResolverInterface:
    alias: App\Core\Customer\Application\Resolver\CustomerReferenceResolver

  App\Shared\Application\Validator\LoggingMutationInputValidator:
    decorates: App\Shared\Application\Validator\MutationInputValidator
    arguments:
      $inner: '@App\Shared\Application\Validator\LoggingMutationInputValidator.inner'
      $logger: '@logger'

  App\Shared\Application\Command\SeedSchemathesisDataCommand:
    tags:
      - {
          name: 'console.command',
          command: 'app:seed-schemathesis-data',
          description: 'Seed schemathesis reference data.',
        }

  # Base repository - used by API Platform for collections
  App\Core\Customer\Infrastructure\Repository\MongoCustomerRepository:
    public: true

  # Cached repository - wraps base repository with caching
  App\Core\Customer\Infrastructure\Repository\CachedCustomerRepository:
    arguments:
      $inner: '@App\Core\Customer\Infrastructure\Repository\MongoCustomerRepository'
      $cache: '@cache.customer'

  App\Core\Customer\Application\CommandHandler\CustomerCacheRefreshCommandHandler:
    arguments:
      $repository: '@App\Core\Customer\Infrastructure\Repository\MongoCustomerRepository'
      $cache: '@cache.customer'

  App\Shared\Application\CommandHandler\CacheInvalidationCommandHandler:
    arguments:
      $cachePoolResolver: '@App\Shared\Application\Resolver\CachePoolResolverInterface'
      $messageBus: '@messenger.bus.default'

  App\Shared\Application\CommandHandler\CacheRefreshCommandHandler:
    tags:
      - { name: 'messenger.message_handler', from_transport: 'cache-refresh' }

  App\Shared\Infrastructure\EventListener\CacheInvalidationDoctrineEventListener:
    tags:
      - { name: 'doctrine_mongodb.odm.event_listener', event: 'onFlush' }
      - { name: 'doctrine_mongodb.odm.event_listener', event: 'postFlush' }

  App\Shared\Infrastructure\Resolver\CacheInvalidationTagResolver:
    arguments:
      $resolvers: !tagged_iterator 'app.cache_invalidation_resolver'

  App\Shared\Infrastructure\Resolver\CacheRefreshCommandHandlerResolver:
    arguments:
      $handlers: !tagged_iterator 'app.cache_refresh_handler'

  App\Shared\Application\Resolver\CacheRefreshCommandHandlerResolverInterface:
    alias: App\Shared\Infrastructure\Resolver\CacheRefreshCommandHandlerResolver

  App\Shared\Infrastructure\Resolver\CacheRefreshPolicyResolver:
    arguments:
      $resolvers: !tagged_iterator 'app.cache_refresh_policy_resolver'

  App\Shared\Application\Resolver\CacheRefreshPolicyResolverInterface:
    alias: App\Shared\Infrastructure\Resolver\CacheRefreshPolicyResolver

  # Alias interface to cached repository for dependency injection
  App\Core\Customer\Domain\Repository\CustomerRepositoryInterface:
    alias: App\Core\Customer\Infrastructure\Repository\CachedCustomerRepository
    public: true

  # Cache invalidation event subscribers - auto-bind cache.customer

  # CacheKeyBuilder - auto-registered via App\ namespace

  # add more service definitions when explicit configuration is needed
  # please note that last definitions always *replace* previous ones

  _instanceof:
    App\Core\Customer\Application\EventSubscriber\CustomerCacheInvalidationSubscriberInterface:
      bind:
        $cache: '@cache.customer'

    App\Shared\Domain\Bus\Event\DomainEventSubscriberInterface:
      tags: ['app.event_subscriber']
    App\Shared\Domain\Bus\Command\CommandHandlerInterface:
      tags: ['app.command_handler']
    App\Shared\Application\OpenApi\Factory\Endpoint\EndpointFactoryInterface:
      tags: ['app.openapi_endpoint_factory']
    App\Shared\Application\Resolver\DocumentCacheInvalidationResolverInterface:
      tags: ['app.cache_invalidation_resolver']
    App\Shared\Application\CommandHandler\CacheRefreshCommandHandlerBase:
      tags: ['app.cache_refresh_handler']
    App\Shared\Application\Resolver\CacheRefreshPolicyResolverInterface:
      tags: ['app.cache_refresh_policy_resolver']

  # ===========================================
  # BUS CONFIGURATION (following user-service patterns)
  # ===========================================

  App\Shared\Infrastructure\Bus\MessageBusFactory: ~

  App\Shared\Infrastructure\Bus\Command\InMemorySymfonyCommandBus:
    arguments:
      - '@App\Shared\Infrastructure\Bus\MessageBusFactory'
      - !tagged_iterator 'app.command_handler'
    lazy: true

  App\Shared\Infrastructure\Bus\Event\InMemorySymfonyEventBus:
    arguments:
      - '@App\Shared\Infrastructure\Bus\MessageBusFactory'
      - !tagged_iterator 'app.event_subscriber'
    lazy: true

  # ===========================================
  # RESILIENT ASYNC EVENT BUS (AP from CAP)
  # ===========================================
  # For resilient async event processing via SQS:
  # - Layer 1: ResilientAsyncEventDispatcher catches SQS failures
  # - Layer 2: DomainEventMessageHandler catches subscriber failures
  # All failures are logged + emit metrics (self-healing pipeline)

  App\Shared\Infrastructure\Bus\Event\Async\ResilientAsyncEventDispatcher:
    arguments:
      $messageBus: '@messenger.bus.default'

  App\Shared\Infrastructure\Bus\Event\Async\DomainEventMessageHandler:
    tags: ['messenger.message_handler']
    arguments:
      $subscribers: !tagged_iterator 'app.event_subscriber'

  # Default: Use resilient async event bus (AP from CAP theorem)
  # Switch to InMemorySymfonyEventBus for sync processing if needed
  App\Shared\Domain\Bus\Event\EventBusInterface:
    alias: App\Shared\Infrastructure\Bus\Event\Async\ResilientAsyncEventBus

  Aws\Sqs\SqsClient:
    arguments:
      - version: '%env(AWS_SQS_VERSION)%'
        region: '%env(AWS_SQS_REGION)%'
        endpoint: '%env(AWS_SQS_ENDPOINT_BASE)%:%env(LOCALSTACK_PORT)%'
        credentials:
          key: '%env(AWS_SQS_KEY)%'
          secret: '%env(AWS_SQS_SECRET)%'

  App\Shared\Application\OpenApi\OpenApiFactory:
    decorates: 'api_platform.openapi.factory'
    arguments:
      [
        '@App\Shared\Application\OpenApi\OpenApiFactory.inner',
        !tagged_iterator app.openapi_endpoint_factory,
        !tagged_iterator app.openapi_processor,
        '@App\Shared\Application\OpenApi\Applier\OpenApiExtensionsApplier',
      ]
    autoconfigure: false

  App\Shared\Application\OpenApi\Processor\ParameterDescriptionProcessor:
    tags:
      - { name: 'app.openapi_processor', priority: 700 }

  App\Shared\Application\OpenApi\Processor\TagDescriptionProcessor:
    tags:
      - { name: 'app.openapi_processor', priority: 600 }

  App\Shared\Application\OpenApi\Processor\IriReferenceTypeProcessor:
    tags:
      - { name: 'app.openapi_processor', priority: 500 }

  App\Shared\Application\OpenApi\Processor\PathParametersProcessor:
    tags:
      - { name: 'app.openapi_processor', priority: 400 }

  App\Shared\Application\OpenApi\Processor\ConstraintViolationPayloadItemsProcessor:
    tags:
      - { name: 'app.openapi_processor', priority: 300 }

  App\Shared\Application\OpenApi\Processor\OpenApiInputContractProcessor:
    tags:
      - { name: 'app.openapi_processor', priority: 250 }

  App\Shared\Application\OpenApi\Processor\OpenApiSchemaFixesProcessor:
    tags:
      - { name: 'app.openapi_processor', priority: 200 }

  App\Shared\Application\OpenApi\Processor\UlidInterfaceSchemaFixer:
    tags:
      - { name: 'app.openapi_processor', priority: 100 }

  App\Shared\Application\OpenApi\Factory\Request\Customer\CreateCustomerRequestFactory:
    arguments:
      $requestBuilder: '@App\Shared\Application\OpenApi\Builder\RequestBuilder'

  App\Shared\Application\OpenApi\Factory\Request\Customer\ReplaceCustomerRequestFactory:
    arguments:
      $requestBuilder: '@App\Shared\Application\OpenApi\Builder\RequestBuilder'

  App\Shared\Application\OpenApi\Factory\Request\Customer\UpdateCustomerRequestFactory:
    arguments:
      $requestBuilder: '@App\Shared\Application\OpenApi\Builder\RequestPatchBuilder'

  App\Shared\Application\OpenApi\Factory\Request\CustomerType\TypeCreateRequestFactory:
    arguments:
      $requestBuilder: '@App\Shared\Application\OpenApi\Builder\RequestBuilder'

  App\Shared\Application\OpenApi\Factory\Request\CustomerType\TypeUpdateRequestFactory:
    arguments:
      $requestBuilder: '@App\Shared\Application\OpenApi\Builder\RequestPatchBuilder'

  App\Shared\Application\OpenApi\Factory\Request\CustomerStatus\StatusCreateRequestFactory:
    arguments:
      $requestBuilder: '@App\Shared\Application\OpenApi\Builder\RequestBuilder'

  App\Shared\Application\OpenApi\Factory\Request\CustomerStatus\StatusUpdateRequestFactory:
    arguments:
      $requestBuilder: '@App\Shared\Application\OpenApi\Builder\RequestPatchBuilder'

  App\Shared\Application\OpenApi\Serializer\ParameterNormalizer:
    decorates: 'api_platform.openapi.normalizer.api_gateway'
    decoration_priority: 10
    arguments:
      - '@App\Shared\Application\OpenApi\Serializer\ParameterNormalizer.inner'
    autoconfigure: false

  App\Shared\Application\OpenApi\Serializer\OpenApiNormalizer:
    decorates: 'api_platform.openapi.normalizer.api_gateway'
    decoration_priority: 5
    arguments:
      $decorated: '@App\Shared\Application\OpenApi\Serializer\OpenApiNormalizer.inner'
