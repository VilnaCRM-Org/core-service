App\Core\Onboarding\Domain\Entity\OnboardingStep:
  exceptionToStatus:
    'App\Core\Onboarding\Domain\Exception\OnboardingStepNotFoundException': 404
  normalizationContext:
    groups: ['output']
  paginationViaCursor:
    - { field: 'ulid', direction: 'DESC' }

  operations:
    ApiPlatform\Metadata\GetCollection:
      filters:
        - onboarding_step.mongodb.order
        - onboarding_step.mongodb.search
        - onboarding_step.mongodb.boolean
        - mongodb.range
    ApiPlatform\Metadata\Get: ~
    ApiPlatform\Metadata\Put:
      input: App\Core\Onboarding\Application\DTO\OnboardingStepPut
      processor: App\Core\Onboarding\Application\Processor\OnboardingStepPutProcessor
      denormalizationContext:
        allow_extra_attributes: false
    ApiPlatform\Metadata\Patch:
      input: App\Core\Onboarding\Application\DTO\OnboardingStepPatch
      processor: App\Core\Onboarding\Application\Processor\OnboardingStepPatchProcessor
      denormalizationContext:
        allow_extra_attributes: true
    ApiPlatform\Metadata\Delete: ~
    ApiPlatform\Metadata\Post:
      input: App\Core\Onboarding\Application\DTO\OnboardingStepCreate
      processor: App\Core\Onboarding\Application\Processor\CreateOnboardingStepProcessor
      denormalizationContext:
        allow_extra_attributes: false

  graphQlOperations:
    ApiPlatform\Metadata\GraphQl\Query:
      filters:
        - onboarding_step.mongodb.order
        - onboarding_step.mongodb.search
        - onboarding_step.mongodb.boolean
        - mongodb.range
    ApiPlatform\Metadata\GraphQl\QueryCollection:
      filters:
        - onboarding_step.mongodb.order
        - onboarding_step.mongodb.search
        - onboarding_step.mongodb.boolean
        - mongodb.range
      paginationType: cursor
    ApiPlatform\Metadata\GraphQl\Mutation:
      name: create
      input: App\Core\Onboarding\Application\DTO\OnboardingStepCreate
      processor: App\Core\Onboarding\Application\Processor\CreateOnboardingStepProcessor
      denormalizationContext:
        allow_extra_attributes: false
    update_mutation:
      class: ApiPlatform\Metadata\GraphQl\Mutation
      name: update
      input: App\Core\Onboarding\Application\DTO\OnboardingStepPatch
      processor: App\Core\Onboarding\Application\Processor\OnboardingStepPatchProcessor
      denormalizationContext:
        allow_extra_attributes: true
    ApiPlatform\Metadata\GraphQl\DeleteMutation:
      name: delete
      normalizationContext:
        groups: ['deleteMutationOutput']
