# config/packages/api_platform.yaml
api_platform:
  title: 'Core Service API'
  description: 'This API provides endpoints to manage core service data within a VilnaCRM.'
  version: '1.0.0'

  use_symfony_listeners: false

  openapi:
    overrideResponses: false
    contact:
      name: 'VilnaCRM Support'
      email: 'support@vilnacrm.com'
      url: 'https://vilnacrm.com'
    license:
      name: 'MIT'
      url: 'https://opensource.org/licenses/MIT'

  defaults:
    paginationClientItemsPerPage: true
    extra_properties:
      rfc_7807_compliant_errors: true

  formats:
    jsonld: ['application/ld+json']

  error_formats:
    jsonproblem: ['application/problem+json']

  # Enable GraphQL support
  graphql:
    enabled: true
    graphiql:
      enabled: true
    graphql_playground: ~
    # Default to ID for mutations
    default_ide: graphiql
    nesting_separator: _
    # Pin query-cost limits explicitly (these are the API Platform defaults)
    # so they remain visible and stable as a defense-in-depth DoS guard.
    max_query_depth: 20
    max_query_complexity: 500

  # Tell API Platform where your domain classes live
  resource_class_directories:
    - '%kernel.project_dir%/src/Core/Customer/Domain/Entity'
    - '%kernel.project_dir%/src/Internal/HealthCheck/Domain/ValueObject'

  # <<< Add this section to load all YAML files in your custom resources folder
  mapping:
    paths:
      - '%kernel.project_dir%/config/api_platform/resources'

# Production hardening: never expose the interactive GraphQL IDE or schema
# introspection in production. The schema, queries and mutations must not be
# enumerable by anonymous clients. Dev/test keep GraphiQL + introspection on.
when@prod:
  api_platform:
    graphql:
      graphiql:
        enabled: false
      introspection:
        enabled: false
