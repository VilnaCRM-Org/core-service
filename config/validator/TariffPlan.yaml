App\Core\Onboarding\Application\DTO\TariffPlanCreate:
  properties: &tariff_plan_required
    code:
      - NotBlank: { message: 'not.blank' }
      - Length: { max: 64 }
      - Regex:
          pattern: '/^[a-z][a-z0-9_]*$/'
          message: 'Use lowercase letters, numbers, and underscores.'
    name:
      - NotBlank: { message: 'not.blank' }
      - Length: { max: 255 }
    description:
      - NotBlank: { message: 'not.blank' }
      - Length: { max: 1000 }
    deploymentOptions:
      - NotNull: { message: 'This value should not be null.' }
      - Count: { min: 1, max: 10 }
      - All:
          constraints:
            - Type: string
            - Length: { max: 64 }
    functionalLimitations:
      - NotNull: { message: 'This value should not be null.' }
      - Type: { type: 'bool', message: 'This value should be a boolean.' }
    userLimit:
      - Positive: ~
    priceCents:
      - NotNull: { message: 'This value should not be null.' }
      - PositiveOrZero: ~
    priceCurrency:
      - NotBlank: { message: 'not.blank' }
      - Regex:
          pattern: '/^[A-Z]{3}$/'
          message: 'Use a three-letter ISO 4217 currency code.'
    pricePeriod:
      - NotBlank: { message: 'not.blank' }
      - Choice: { choices: ['none', 'one_time', 'monthly', 'yearly', 'per_user'] }
    position:
      - NotNull: { message: 'This value should not be null.' }
      - Positive: ~
    enabled:
      - NotNull: { message: 'This value should not be null.' }
      - Type: { type: 'bool', message: 'This value should be a boolean.' }

App\Core\Onboarding\Application\DTO\TariffPlanPut:
  properties: *tariff_plan_required

App\Core\Onboarding\Application\DTO\TariffPlanPatch:
  properties:
    code:
      - Length: { max: 64 }
      - Regex:
          pattern: '/^[a-z][a-z0-9_]*$/'
          message: 'Use lowercase letters, numbers, and underscores.'
    name:
      - Length: { max: 255 }
    description:
      - Length: { max: 1000 }
    deploymentOptions:
      - Count: { min: 1, max: 10 }
      - All:
          constraints:
            - Type: string
            - Length: { max: 64 }
    functionalLimitations:
      - Type: { type: 'bool', message: 'This value should be a boolean.' }
    userLimit:
      - Positive: ~
    priceCents:
      - PositiveOrZero: ~
    priceCurrency:
      - Regex:
          pattern: '/^[A-Z]{3}$/'
          message: 'Use a three-letter ISO 4217 currency code.'
    pricePeriod:
      - Choice: { choices: ['none', 'one_time', 'monthly', 'yearly', 'per_user'] }
    position:
      - Positive: ~
    enabled:
      - Type: { type: 'bool', message: 'This value should be a boolean.' }
