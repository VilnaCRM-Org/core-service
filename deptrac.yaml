parameters:
  paths:
    - './src'
  exclude_files:
    - './Shared/Kernel/.*'
    - '.*test.*'
  layers:
    - name: Application
      collectors:
        - type: classNameRegex
          value: '#.*\\Application\\(Transformer|Command|CommandHandler|DTO|EventListener|EventSubscriber|Factory|MutationInput|Processor|Resolver|ExceptionMessageHandler|Message|Metric).*#'
        - type: classNameRegex
          value: '#.*\\Internal\\HealthCheck\\Application\\(Transformer|Command|CommandHandler|DTO|EventListener|EventSubscriber|Factory|MutationInput|Processor|Resolver|ExceptionMessageHandler|Message).*#'
        - type: classNameRegex
          value: '#.*\\Shared\\Application\\(Validator|Transformer|ErrorProvider|DomainExceptionNormalizer|NotFoundExceptionNormalizer|Extractor|Bus).*#'
        - type: classNameRegex
          value: '#.*\\Shared\\Application\\OpenApi\\(Factory|Builder|OpenApiFactory|Processor|Cleaner|Transformer|Resolver|Applier|Mapper|ValueObject).*#'
        - type: classNameRegex
          value: '#.*\\Shared\\Application\\OpenApi\\(ParameterDescriptionDictionary|TagDescriptionDictionary)#'
        - type: classNameRegex
          value: '#.*\\Shared\\Application\\Observability\\(Metric|Emitter|Factory|Collection|ValueObject).*#'

    - name: Domain
      collectors:
        - type: classNameRegex
          value: '#.*\\Domain\\(Aggregate|Entity|ValueObject|Event|Exception|Factory|Repository|Collection).*#'
        - type: classNameRegex
          value: '#.*\\Internal\\HealthCheck\\Domain\\(Aggregate|Entity|Event|Exception|Factory|Repository|Collection).*#'
        - type: classNameRegex
          value: '#.*\\Shared\\Domain\\Bus\\(Command|Event).*#'

    - name: Infrastructure
      collectors:
        - type: classNameRegex
          value: '#.*\\Internal\\HealthCheck\\Infrastructure\\(Factory|Repository).*#'
        - type: classNameRegex
          value: '#.*\\Shared\\Infrastructure\\(Bus\\(Command|Event|MessageBusFactory|CallableFirstParameterExtractor|InvokeParameterExtractor)|Transformer|Factory|Validator|Cache|Observability|EventDispatcher|RetryStrategy).*#'

    - name: Symfony
      collectors:
        - type: classNameRegex
          value: '#.*Symfony\\.*#'

    - name: Doctrine
      collectors:
        - type: classNameRegex
          value: '#.*Doctrine\\.*#'

    - name: ApiPlatform
      collectors:
        - type: classNameRegex
          value: '#.*ApiPlatform\\.*#'

    - name: Logging
      collectors:
        - type: classNameRegex
          value: '#.*Psr\\Log\\.*#'

    - name: GraphQl
      collectors:
        - type: classNameRegex
          value: '#.*GraphQL\\.*#'

    - name: BSON
      collectors:
        - type: classNameRegex
          value: '#MongoDB\\BSON\\.*#'

  ruleset:
    Application:
      - Domain
      - Infrastructure
      - Symfony
      - ApiPlatform
      - Logging
      - GraphQl
      - BSON
    Infrastructure:
      - Domain
      - Application
      - Symfony
      - Doctrine
      - Logging
      - BSON
    Domain: []
